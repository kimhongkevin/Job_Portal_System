spring:
  application:
    name: job_portal
  datasource:
    url: jdbc:postgresql://localhost:5432/jobportal_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: 123
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
jwt:
  secret: your-super-long-random-secret-key-min-32-characters-long
  expiration: 86400000

file:
  upload-dir: uploads/resumes

springdoc:
  swagger-ui:
    enabled: true
  default-consumes-media-type: multipart/form-data