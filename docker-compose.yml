version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: jobportal_db
    environment:
      POSTGRES_DB: jobportal_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Spring Boot Application
  app:
    build: .
    container_name: jobportal_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/jobportal_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      JWT_SECRET: your-super-long-random-secret-key-min-32-characters-long
      JWT_EXPIRATION: 86400000
      FILE_UPLOAD_DIR: /app/uploads/resumes
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - upload_data:/app/uploads/resumes

volumes:
  postgres_data:
  upload_data: